# General
#include ~/.config/kitty/themes/tokyo-night.conf
include ~/.config/kitty/themes/midnight-haze.conf
#include ~/.config/omarchy/current/theme/kitty.conf

# Remote
allow_remote_control yes

# Window
window_padding_width 5
hide_window_decorations yes
confirm_os_window_close 0

# Scrolling
scrollback_lines 10000
wheel_scroll_multiplier 5.0

# Font
font_family JetBrainsMono Nerd Font
bold_italic_font auto
font_size 15.0
# Font offset
modify_font underline_position 0
modify_font underline_thickness 100%
modify_font strikethrough_position 0

# Cursor
cursor_shape block
cursor_blink_interval 0
shell_integration no-cursor
enable_audio_bell no

# Bindings
map ctrl+v paste_from_clipboard
map shift+insert paste_from_clipboard
map ctrl+insert copy_to_clipboard
map ctrl+shift+n new_os_window
mouse_map right press ungrabbed paste_from_clipboard

# Tab style
tab_bar_edge bottom
tab_bar_style powerline
tab_powerline_style slanted
tab_title_template {title}{' :{}:'.format(num_windows) if num_windows > 1 else ''}
