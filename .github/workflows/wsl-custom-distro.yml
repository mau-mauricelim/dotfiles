name: wsl-custom-distro

on:
  push:
    branches:
      - "main"

env:
  DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
  IMAGE_NAME: Ubuntu-custom
  IMAGE_NAME_TAG: $DOCKERHUB_USERNAME/$IMAGE_NAME:latest

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      -
        name: Test env
        run: echo $DOCKERHUB_USERNAME $IMAGE_NAME $IMAGE_NAME_TAG
      -
        name: Checkout
        uses: actions/checkout@v4
      -
        name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      -
        name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: $DOCKERHUB_USERNAME
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      -
        name: Build and load
        uses: docker/build-push-action@v5
        with:
          context: .
          load: true
          tags: $IMAGE_NAME_TAG
          cache-from: type=gha
          cache-to: type=gha,mode=max
      -
        name: Upload docker image to registry
        run: docker image push $IMAGE_NAME_TAG
      -
        name: Export docker container to a tar.gz file using gzip
        run: |
          docker run -dit --hostname $IMAGE_NAME --name $IMAGE_NAME $IMAGE_NAME_TAG
          docker export $IMAGE_NAME | gzip > /tmp/$IMAGE_NAME.tar.gz
      -
        name: Export WSL install script
        run: sed "s/SET_DISTRO_NAME/$IMAGE_NAME/g" src/install.cmd > /tmp/install.cmd
      -
        name: Upload WSL image
        uses: actions/upload-artifact@v4
        with:
          name: wsl-custom-distro
          path: |
            /tmp/$IMAGE_NAME.tar.gz
            /tmp/install.cmd