name: wsl-custom-distro

on:
  push:
    branches:
      - "main"

# Variables in the env map cannot be defined in terms of other variables in the map
env:
  DOCKERHUB_USERNAME: maumauricelim
  IMAGE_NAME: Ubuntu-custom

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      -
        name: Checkout
        uses: actions/checkout@v4
      -
        name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      -
        name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: $DOCKERHUB_USERNAME
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      -
        name: Build and load
        uses: docker/build-push-action@v5
        with:
          context: .
          load: true
          tags: $DOCKERHUB_USERNAME/$IMAGE_NAME:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
      -
        name: Upload docker image to registry
        run: docker image push $DOCKERHUB_USERNAME/$IMAGE_NAME:latest
      -
        name: Export docker container to a tar.gz file using gzip
        run: |
          docker run -dit --hostname $IMAGE_NAME --name $IMAGE_NAME $DOCKERHUB_USERNAME/$IMAGE_NAME:latest
          docker export $IMAGE_NAME | gzip > /tmp/$IMAGE_NAME.tar.gz
      -
        name: Export WSL install script
        run: sed "s/SET_DISTRO_NAME/$IMAGE_NAME/g" src/install.cmd > /tmp/install.cmd
      -
        name: Upload WSL image
        uses: actions/upload-artifact@v4
        with:
          name: wsl-custom-distro
          path: |
            /tmp/$IMAGE_NAME.tar.gz
            /tmp/install.cmd