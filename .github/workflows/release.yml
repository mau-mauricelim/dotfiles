name: Release

on:
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Download all workflow run Artifacts
        uses: actions/download-artifact@v4
        with:
          name: wsl-alpine-custom
      - run: ls -R wsl-alpine-custom