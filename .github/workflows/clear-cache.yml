name: Clear all cache
on:
  workflow_dispatch:

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      -
        name: Checkout
        uses: actions/checkout@v4
      -
        name: Cleanup
        run: |
          gh extension install actions/gh-actions-cache
          gh cache delete --all
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}