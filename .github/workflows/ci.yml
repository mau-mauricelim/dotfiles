name: ci

on:
  push:
    branches:
      - "main"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      -
        name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      -
        name: Build and export
        uses: docker/build-push-action@v5
        with:
          context: .
          tags: zsh-nvim:latest
          outputs: type=docker,dest=/tmp/zsh-nvim.tar
      -
        name: Upload WSL image
        uses: actions/upload-artifact@v3
        with:
          name: wsl-image
          path: /tmp/zsh-nvim.tar
      -
        name: Upload WSL install script
        uses: actions/upload-artifact@v3
        with:
          name: wsl-install
          path: src/install.cmd