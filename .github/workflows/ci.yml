name: ci

on:
  push:
    branches:
      - "main"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      -
        name: Checkout
        uses: actions/checkout@v4
      -
        name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      -
        name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      -
        name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: maumauricelim/zsh-nvim:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
      -
        name: Save docker image to a tar.gz file using gzip
        run: docker save maumauricelim/zsh-nvim:latest | gzip > /tmp/zsh-nvim.tar.gz
      -
        name: Export WSL install script
        run: cp src/install.cmd /tmp
      -
        name: Upload WSL image
        uses: actions/upload-artifact@v4
        with:
          name: wsl-image
          path: |
            /tmp/zsh-nvim.tar.gz
            /tmp/install.cmd